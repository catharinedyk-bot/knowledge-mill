
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>知识磨坊</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0A84FF; --text: #fff; --sub: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #inbox { width: 320px; background: #121212; border-right: 1px solid #333; padding: 25px; display: flex; flex-direction: column; flex-shrink: 0; }
        #workspace { flex: 1; padding: 40px; overflow-y: auto; }
        
        textarea { width: 100%; height: 180px; border-radius: 12px; border: 1px solid #333; background: #2c2c2e; color: #fff; padding: 15px; margin-bottom: 15px; resize: none; font-size: 14px; line-height: 1.5; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        
        .bank-item { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; cursor: pointer; position: relative; }
        .tag { display: inline-block; background: rgba(10, 132, 255, 0.15); color: var(--accent); padding: 4px 10px; border-radius: 6px; font-size: 11px; margin-right: 5px; margin-bottom: 5px; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-card { width: 650px; max-height: 85vh; background: #2c2c2e; border-radius: 20px; padding: 30px; overflow-y: auto; border: 1px solid #444; }
        
        .note-content { line-height: 1.7; color: #eee; font-size: 15px; }
        .note-content h1, .note-content h2 { color: var(--accent); border-bottom: 1px solid #444; padding-bottom: 8px; margin-top: 20px; }
        .delete-btn { position: absolute; right: 15px; top: 15px; color: #ff453a; font-size: 18px; opacity: 0.5; cursor: pointer; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            #inbox { width: 100%; border-right: none; height: auto; padding: 20px; box-sizing: border-box; }
            .modal-card { width: 90%; padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="inbox">
        <h2 style="margin-top:0;">📝 知识下达</h2>
        <textarea id="rawInput" placeholder="输入你的诉求（例如：帮我整理万历年间的大事记）或 粘贴长文链接..."></textarea>
        <button onclick="startMetabolism()">生成详细笔记</button>

        <div style="margin-top: auto; border-top: 1px solid #333; padding-top: 20px;">
            <button onclick="updateKey()" style="background: #333; width: 100%; font-size: 12px; margin-bottom: 10px;">🔑 配置 DeepSeek Key</button>
            <button onclick="clearAllData()" style="background: #410b0b; color: #ff453a; width: 100%; font-size: 12px;">🗑️ 清空保险箱</button>
        </div>
    </div>

    <div id="workspace">
        <h2 style="margin-top:0;">🧠 知识保险箱</h2>
        <div id="knowledge-bank"></div>
    </div>

    <div id="mill-modal" class="modal">
        <div class="modal-card">
            <h3 id="ai-title" style="margin-top:0; color:var(--accent);">磨坊正在运转...</h3>
            <div id="ai-result-preview" style="margin-bottom: 20px;">
                <p id="ai-summary" style="font-weight:bold; font-size:16px;"></p>
                <div id="ai-full-preview" class="note-content" style="background:#1c1c1e; padding:15px; border-radius:10px; max-height:300px; overflow-y:auto; font-size:13px; color:#ccc;"></div>
            </div>
            <button id="save-btn" onclick="finishRecall()" style="width:100%; display:none;">确认并存入保险箱</button>
        </div>
    </div>

    <div id="note-modal" class="modal" onclick="closeNote()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <span style="float: right; cursor: pointer; color: var(--sub); font-size: 28px;" onclick="closeNote()">&times;</span>
            <div id="note-tags-display"></div>
            <h2 id="note-title" style="margin: 10px 0;"></h2>
            <div id="note-body" class="note-content"></div>
        </div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('MY_MILL_KEY') || '';

        function updateKey() {
            const key = prompt("请输入 DeepSeek API Key:", API_KEY);
            if (key) { API_KEY = key.trim(); localStorage.setItem('MY_MILL_KEY', API_KEY); alert("Key 已保存！"); }
        }

        window.onload = () => {
            const savedData = localStorage.getItem('my_knowledge_vault');
            if (savedData) JSON.parse(savedData).forEach(item => renderItem(item));
        };

        async function startMetabolism() {
            if (!API_KEY) return updateKey();
            let input = document.getElementById('rawInput').value.trim();
            if (!input) return;

            document.getElementById('mill-modal').style.display = 'flex';
            document.getElementById('save-btn').style.display = 'none';
            document.getElementById('ai-title').innerText = "🧠 正在构建知识体系...";
            document.getElementById('ai-summary').innerText = "请稍候，正在为您翻阅资料并整理...";
            document.getElementById('ai-full-preview').innerHTML = "";

            if (input.startsWith('http')) {
                try {
                    const res = await fetch(`https://r.jina.ai/${input}`);
                    if (res.ok) input = await res.text();
                } catch (e) { console.log("抓取失败"); }
            }

            const promptText = `你是一个博学且擅长教学的专家。
            如果用户输入的是一个主题指令，请基于你的知识储备撰写。
            如果用户输入的是长文内容，请进行深度整理。
            输出纯JSON格式:
            {
              "summary": "一句话核心定义/描述",
              "full_note": "详尽的Markdown格式笔记，要求：逻辑清晰，保持深度，有阅读趣味。",
              "tags": ["领域", "核心词"]
            }
            用户诉求/内容: ${input.substring(0, 10000)}`;

            try {
                const res = await fetch("https://api.deepseek.com/chat/completions", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{ role: "system", content: "你是一个只输出JSON的百科全书助手。" }, { role: "user", content: promptText }],
                        response_format: { 'type': 'json_object' }
                    })
                });

                const data = await res.json();
                const result = JSON.parse(data.choices[0].message.content.replace(/```json|```/g, ''));

                document.getElementById('ai-title').innerText = "✅ 知识已就绪";
                document.getElementById('ai-summary').innerText = result.summary;
                document.getElementById('ai-full-preview').innerHTML = marked.parse(result.full_note);
                document.getElementById('save-btn').style.display = 'block';
                window.currentData = result;

            } catch (e) {
                alert("生成失败: " + e.message);
                document.getElementById('mill-modal').style.display = 'none';
            }
        }

        function finishRecall() {
            const newItem = { id: Date.now(), time: new Date().toLocaleString(), ...window.currentData };
            const savedData = JSON.parse(localStorage.getItem('my_knowledge_vault') || '[]');
            savedData.unshift(newItem);
            localStorage.setItem('my_knowledge_vault', JSON.stringify(savedData));
            renderItem(newItem, true);
            document.getElementById('mill-modal').style.display = 'none';
            document.getElementById('rawInput').value = "";
        }

        function renderItem(item, isNew = false) {
            const div = document.createElement('div');
            div.className = 'bank-item';
            div.id = `item-${item.id}`;
            div.onclick = () => openNote(item);
            div.innerHTML = `
                <span class="delete-btn" onclick="deleteItem(event, ${item.id})">&times;</span>
                <div>${(item.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
                <p style="font-weight:bold; margin:10px 0;">${item.summary}</p>
                <small style="color:var(--sub)">${item.time}</small>
            `;
            const bank = document.getElementById('knowledge-bank');
            if (isNew) bank.prepend(div); else bank.appendChild(div);
        }

        function openNote(item) {
            document.getElementById('note-title').innerText = item.summary;
            document.getElementById('note-body').innerHTML = marked.parse(item.full_note);
            document.getElementById('note-tags-display').innerHTML = (item.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
            document.getElementById('note-modal').style.display = 'flex';
        }

        function closeNote() { document.getElementById('note-modal').style.display = 'none'; }
        function deleteItem(e, id) { e.stopPropagation(); if(confirm("删除此笔记？")) { 
            let data = JSON.parse(localStorage.getItem('my_knowledge_vault') || '[]');
            localStorage.setItem('my_knowledge_vault', JSON.stringify(data.filter(i => i.id !== id)));
            document.getElementById(`item-${id}`).remove();
        }}
        function clearAllData() { if(confirm("清空保险箱？")) { localStorage.clear(); location.reload(); }}
    </script>
</body>
</html>
