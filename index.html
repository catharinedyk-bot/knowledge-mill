<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>知识磨坊 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #000;
            --card: #1c1c1e;
            --accent: #0A84FF;
            --text: #fff;
            --sub: #8e8e93;
        }

        body {
            font-family: -apple-system, "SF Pro Text", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-direction: row;
        }

        /* 响应式布局：手机端上下排列 */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            #inbox { width: 100% !important; border-right: none !important; border-bottom: 1px solid #333; height: auto !important; }
            #workspace { padding: 20px !important; }
            .modal-card { width: 92% !important; padding: 20px !important; }
        }

        #inbox {
            width: 300px;
            background: #121212;
            border-right: 1px solid #333;
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        #workspace {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #2c2c2e;
            color: #fff;
            padding: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active { transform: scale(0.98); opacity: 0.8; }

        .bank-item {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #333;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }

        .bank-item:hover { border-color: var(--accent); }

        .tag {
            display: inline-block;
            background: rgba(10, 132, 255, 0.15);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-card {
            width: 600px;
            max-height: 85vh;
            background: #2c2c2e;
            border-radius: 20px;
            padding: 30px;
            overflow-y: auto;
            border: 1px solid #444;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .note-content { line-height: 1.6; color: #eee; }
        .note-content h1, .note-content h2 { color: var(--accent); border-bottom: 1px solid #444; padding-bottom: 8px; }
        
        .delete-btn { position: absolute; right: 15px; top: 15px; color: #ff453a; font-size: 18px; opacity: 0.5; padding: 5px; }
    </style>
</head>

<body>

    <div id="inbox">
        <h2 style="font-size: 20px; margin-top: 0;">📥 捕获</h2>
        <textarea id="rawInput" placeholder="在此粘贴长文本或网页链接..."></textarea>
        <button onclick="startMetabolism()">开始代谢</button>

        <div style="margin-top: auto; border-top: 1px solid #333; padding-top: 20px;">
            <div style="font-size: 11px; color: var(--sub); margin-bottom: 8px;">SETTING</div>
            <button onclick="updateKey()" style="background: #333; width: 100%; font-size: 12px; margin-bottom: 10px;">🔑 配置 API Key</button>
            <button onclick="clearAllData()" style="background: #410b0b; color: #ff453a; width: 100%; font-size: 12px;">🗑️ 清空保险箱</button>
        </div>
    </div>

    <div id="workspace">
        <h2 style="font-size: 20px; margin-top: 0;">🧠 知识保险箱</h2>
        <div id="knowledge-bank"></div>
    </div>

    <div id="mill-modal" class="modal">
        <div class="modal-card">
            <h3 id="ai-title" style="margin-top: 0;">正在代谢...</h3>
            <p id="ai-summary" style="color:#bbb; font-size: 14px; line-height: 1.5;"></p>
            <div id="recall-area" style="display:none; margin-top:20px; border-top:1px solid #444; padding-top:20px;">
                <p id="ai-question" style="color:var(--accent); font-weight:bold; margin-bottom: 15px;"></p>
                <input type="text" id="answerInput" placeholder="写下你的理解..." style="width:100%; padding:12px; background:#1c1c1e; border:1px solid #444; color:white; border-radius:8px; outline:none; margin-bottom: 15px;">
                <button onclick="finishRecall()" style="width:100%;">存入保险箱</button>
            </div>
        </div>
    </div>

    <div id="note-modal" class="modal" onclick="closeNote()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <span style="float: right; cursor: pointer; color: var(--sub); font-size: 28px; line-height: 20px;" onclick="closeNote()">&times;</span>
            <div id="note-tags-display"></div>
            <h2 id="note-title" style="margin: 10px 0;"></h2>
            <p id="note-time" style="font-size: 12px; color: var(--sub); margin-bottom: 20px;"></p>
            <div id="note-body" class="note-content"></div>
            <div style="margin-top: 30px; padding: 20px; background: rgba(10, 132, 255, 0.05); border-left: 4px solid var(--accent); border-radius: 8px;">
                <h4 style="margin: 0 0 10px 0; color: var(--accent);">💡 我的思考归档：</h4>
                <p id="note-my-answer" style="margin: 0; font-style: italic; color: #ccc;"></p>
            </div>
        </div>
    </div>

    <script>
        // 1. 安全获取 Key (变量名改为通用的 API_KEY)
        let API_KEY = localStorage.getItem('MY_MILL_KEY') || '';

        function updateKey() {
            const key = prompt("请输入 DeepSeek API Key (仅保存在本地存储):", API_KEY);
            if (key !== null) {
                API_KEY = key.trim();
                localStorage.setItem('MY_MILL_KEY', API_KEY);
                alert("DeepSeek Key 已更新！");
            }
        }

        // 2. 页面加载初始化
        window.onload = () => {
            const savedData = localStorage.getItem('my_knowledge_vault');
            if (savedData) {
                try {
                    JSON.parse(savedData).forEach(item => renderItem(item));
                } catch(e) { console.error("数据解析失败"); }
            }
            
            // 如果没有 Key，弹出提示
            if (!API_KEY) {
                setTimeout(() => alert("欢迎使用知识磨坊！请先点击下方的『🔑 配置 API Key』并填入您的 DeepSeek Key。"), 1000);
            }
            
            // 注册 Service Worker (PWA)
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log("PWA 就绪"))
                    .catch(() => console.log("本地预览暂不支持SW"));
            }
        };

        async function startMetabolism() {
            // 1. 检查 Key（这里的 localStorage 变量名可以保持不变）
            let API_KEY = localStorage.getItem('MY_MILL_KEY') || '';
            if (!API_KEY) { alert("请先配置 DeepSeek API Key"); return updateKey(); }
        
            let input = document.getElementById('rawInput').value.trim();
            if (!input) return;
        
            document.getElementById('mill-modal').style.display = 'flex';
            document.getElementById('recall-area').style.display = 'none';
            document.getElementById('ai-title').innerText = "🧠 DeepSeek 正在思考...";
        
            // 2. 网页抓取 (保持不变)
            if (input.startsWith('http')) {
                try {
                    const response = await fetch(`https://r.jina.ai/${input}`);
                    if (response.ok) input = await response.text();
                } catch (e) { console.log("抓取受限"); }
            }
        
            // 3. 构建 Prompt
            const promptText = `你是一个知识内化教练。请将内容转为纯JSON格式(不要带Markdown外壳):{"summary":"核心摘要","question":"追问","full_note":"Markdown笔记","tags":["标签"]} 内容:${input.substring(0, 8000)}`;
        
            try {
                // 4. 发起 DeepSeek 请求
                const res = await fetch("https://api.deepseek.com/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}` // 注意这里加了 Bearer
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat", // 使用 deepseek-chat 模型
                        messages: [
                            { role: "system", content: "你是一个只输出 JSON 的助手。" },
                            { role: "user", content: promptText }
                        ],
                        response_format: { 'type': 'json_object' } // 强制输出 JSON
                    })
                });
        
                const data = await res.json();
        
                if (data.error) {
                    throw new Error(data.error.message);
                }
        
                // 5. 解析回答 (DeepSeek 的路径是 choices[0].message.content)
                let rawText = data.choices[0].message.content;
                rawText = rawText.replace(/```json|```/g, '').trim();
                
                const aiResult = JSON.parse(rawText);
        
                document.getElementById('ai-title').innerText = "✅ 代谢完成";
                document.getElementById('ai-summary').innerText = aiResult.summary;
                document.getElementById('ai-question').innerText = "🤔 思考：" + aiResult.question;
                document.getElementById('recall-area').style.display = 'block';
                window.currentData = aiResult;
        
            } catch (e) {
                alert("DeepSeek 代谢失败: " + e.message);
                document.getElementById('mill-modal').style.display = 'none';
            }
        }
        // 4. 存储与渲染
        function finishRecall() {
            const answer = document.getElementById('answerInput').value;
            if (!answer) return alert("请写下一句话再存入");

            const newItem = {
                id: Date.now(),
                time: new Date().toLocaleString(),
                ...window.currentData,
                myAnswer: answer
            };

            const savedData = JSON.parse(localStorage.getItem('my_knowledge_vault') || '[]');
            savedData.unshift(newItem);
            localStorage.setItem('my_knowledge_vault', JSON.stringify(savedData));

            renderItem(newItem, true);
            document.getElementById('mill-modal').style.display = 'none';
            document.getElementById('rawInput').value = '';
            document.getElementById('answerInput').value = '';
        }

        function renderItem(item, isNew = false) {
            const div = document.createElement('div');
            div.className = 'bank-item';
            div.id = `item-${item.id}`;
            div.onclick = () => openNote(item);

            const tagsHTML = (item.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
            div.innerHTML = `
                <span class="delete-btn" onclick="deleteItem(event, ${item.id})">&times;</span>
                <div style="margin-bottom: 8px;">${tagsHTML}</div>
                <p style="font-weight:bold; margin:5px 0;">${item.summary}</p>
                <p style="color:#666; font-size:12px;">📄 点击展开详情 · ${item.time}</p>
            `;
            const bank = document.getElementById('knowledge-bank');
            if (isNew) bank.prepend(div); else bank.appendChild(div);
        }

        // 5. 详情查看与删除
        function openNote(item) {
            document.getElementById('note-title').innerText = item.summary;
            document.getElementById('note-time').innerText = "归档时间：" + item.time;
            document.getElementById('note-body').innerHTML = marked.parse(item.full_note || "");
            document.getElementById('note-my-answer').innerText = item.myAnswer;
            document.getElementById('note-tags-display').innerHTML = (item.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
            document.getElementById('note-modal').style.display = 'flex';
        }

        function closeNote() { document.getElementById('note-modal').style.display = 'none'; }

        function deleteItem(event, id) {
            event.stopPropagation();
            if (!confirm("确定删除吗？")) return;
            let data = JSON.parse(localStorage.getItem('my_knowledge_vault') || '[]');
            data = data.filter(i => i.id !== id);
            localStorage.setItem('my_knowledge_vault', JSON.stringify(data));
            document.getElementById(`item-${id}`).remove();
        }

        function clearAllData() { if (confirm("确定清空吗？")) { localStorage.clear(); location.reload(); } }
    </script>
</body>

</html>
